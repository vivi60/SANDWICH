<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>소풍</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --euphoria-green: #57825a;
            --soft-white: #fcfaf2;
            --accent-wood: #d4a373;
            --deep-green: #3e5c40;
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: var(--euphoria-green); 
            font-family: 'Pretendard', sans-serif;
            user-select: none;
            cursor: default; 
        }
        
        #ui-container {
            position: absolute; top: 30px; width: 100%;
            text-align: center;
            pointer-events: none; z-index: 10;
            color: var(--soft-white);
        }
        #score-board { 
            font-size: 36px; font-weight: 800; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            margin-bottom: 5px;
        }
        #sub-text { font-size: 16px; opacity: 0.8; }

        #restart-top-btn {
            position: fixed; top: 20px; right: 20px; z-index: 30;
            padding: 10px 20px; font-size: 14px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white; border: 1px solid white;
            border-radius: 20px; cursor: pointer; transition: 0.3s;
            pointer-events: auto;
        }
        #restart-top-btn:hover { background-color: white; color: var(--euphoria-green); }

        /* --- 게임 오버 화면 (중앙 폴라로이드) --- */
        #game-over-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; 
            z-index: 20;
            background-color: rgba(0,0,0,0.6); 
        }

        #polaroid-frame {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(3deg);
            background: #fff;
            padding: 20px 20px 40px 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            width: 70%;
            max-width: 400px;
            border-radius: 4px;
            animation: polaroidIn 0.6s ease-out;
            text-align: center;
        }

        @keyframes polaroidIn {
            from { transform: translate(-50%, -50%) rotate(20deg) scale(0.6); opacity: 0; }
            to { transform: translate(-50%, -50%) rotate(3deg) scale(1); opacity: 1; }
        }

        #polaroid-photo-area {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: var(--euphoria-green);
            border: 2px solid #ddd;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        #polaroid-img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        #polaroid-result-area {
            color: #333;
        }

        #game-over-title {
            color: var(--euphoria-green);
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 8px 0;
            letter-spacing: -1px;
        }

        #final-score {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 20px 0;
        }

        .big-btn {
            padding: 10px 35px;
            font-size: 16px;
            cursor: pointer;
            background-color: var(--euphoria-green);
            color: white;
            border: none;
            border-radius: 50px;
            transition: all 0.2s;
            box-shadow: 0 4px 0 var(--deep-green);
            font-weight: bold;
        }
        .big-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 var(--deep-green); }
        .big-btn:active { transform: translateY(1px); box-shadow: none; }

    </style>
</head>
<body>

<div id="ui-container">
    <div id="score-board">SCORE: <span id="score">0</span></div>
    <div id="sub-text">재료를 쌓아 호그와트 최고의 샌드위치를 만드세요!</div>
</div>

<button id="restart-top-btn" onclick="resetGame()">다시 만들기</button>

<div id="game-over-screen">
    <div id="polaroid-frame">
        <div id="polaroid-photo-area">
            <img id="polaroid-img" src="" alt="GameOver Snapshot">
        </div>
        
        <div id="polaroid-result-area">
            <h2 id="game-over-title">SANDWICH!</h2>
            <p id="final-score">최종 점수: 0</p>
            <button class="big-btn" onclick="resetGame()">다시 만들러 가기</button>
        </div>
    </div>
</div>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;

    let engine, render, runner;
    let score = 0;
    let isGameOver = false;
    let isCoolingDown = false; 
    
    let previewBody; 
    let currentPreviewItem; 
    const spawnY = 130; 
    
    let plateBody; 

    const ingredientsData = [
        { name: '호밀빵', w: 150, h: 25, color: '#E8BE8D', pts: 10 },
        { name: '로스트햄', w: 130, h: 12, color: '#e5989b', pts: 5 },
        { name: '체다치즈', w: 120, h: 10, color: '#ffcc33', pts: 5 },
        { name: '싱싱한 상추', w: 160, h: 18, color: '#99d98c', pts: 15 },
        { name: '잘 익은 토마토', w: 70, h: 30, color: '#ff4d4d', pts: 20 }
    ];

    function prepareNextItem() {
        currentPreviewItem = ingredientsData[Math.floor(Math.random() * ingredientsData.length)];
        
        if (previewBody) {
            Composite.remove(engine.world, previewBody);
        }

        previewBody = Bodies.rectangle(
            window.innerWidth / 2, 
            spawnY, 
            currentPreviewItem.w, 
            currentPreviewItem.h, 
            { 
                isStatic: true, 
                collisionFilter: { mask: 0 }, 
                render: { 
                    fillStyle: currentPreviewItem.color, 
                    opacity: isCoolingDown ? 0.3 : 1,
                    lineWidth: 0 
                } 
            }
        );
        
        Composite.add(engine.world, previewBody);
    }

    function handleMouseMove(e) {
        if (isGameOver || !previewBody) return;
        Body.setPosition(previewBody, { x: e.clientX, y: spawnY });
    }

    function handleMouseDown(e) {
        if (isGameOver || isCoolingDown || !currentPreviewItem) return;
        if (e.target.tagName === 'BUTTON') return;

        const newIngredient = Bodies.rectangle(
            e.clientX, 
            spawnY, 
            currentPreviewItem.w, 
            currentPreviewItem.h, 
            { 
                friction: 0.8,
                restitution: 0.1,
                render: { fillStyle: currentPreviewItem.color, lineWidth: 0 } 
            }
        );
        Composite.add(engine.world, newIngredient);
        
        score += currentPreviewItem.pts;
        document.getElementById('score').innerText = score;

        isCoolingDown = true;
        prepareNextItem(); 

        setTimeout(() => {
            isCoolingDown = false;
            if (previewBody) {
                previewBody.render.opacity = 1; 
            }
        }, 1000); 
    }

    function init() {
        isGameOver = false;
        isCoolingDown = false;
        score = 0;
        document.getElementById('score').innerText = '0';
        document.getElementById('game-over-screen').style.display = 'none';

        engine = Engine.create();
        
        render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: 'transparent',
                pixelRatio: 1, 
            }
        });

        // --- 🛠️ 수정 2: 바닥(접시) 위치 하향 ---
        // 기존 innerHeight - 120 -> innerHeight - 80으로 변경하여 아래로 내림
        plateBody = Bodies.rectangle(window.innerWidth / 2, window.innerHeight - 80, 350, 30, { 
            isStatic: true, 
            label: 'plate',
            chamfer: { radius: 12 },
            render: { fillStyle: '#d4a373' } 
        });

        const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 60, window.innerWidth, 100, { 
            isStatic: true, 
            label: 'ground' 
        });

        Composite.add(engine.world, [plateBody, ground]);

        Render.run(render);
        runner = Runner.create();
        Runner.run(runner, engine);

        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                if (pair.bodyA.label === 'ground' || pair.bodyB.label === 'ground') {
                    gameOver();
                }
            });
        });

        prepareNextItem();
        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('mousedown', handleMouseDown);
    }

    function gameOver() {
        if (isGameOver) return;
        isGameOver = true;
        Runner.stop(runner); // 엔진 멈춤
        
        if (previewBody) Composite.remove(engine.world, previewBody);

        // --- 📸 폴라로이드 스냅샷 촬영 및 화면 표시 ---
        // 1초 뒤 잔해들이 멈추면 촬영
        setTimeout(() => {
            const mainCanvas = render.canvas;
            
            try {
                // --- 🔍 수정 1: Zoom-out 촬영 로직 ---
                // 접시의 위치를 가져옵니다.
                const platePos = plateBody.position;
                const plateWidth = 350; // 접시 너비 (init 함수 참고)

                // 접시 너비보다 훨씬 넓게 정사각형 영역을 계산합니다.
                // 기존 + 50 -> + 200으로 변경하여 줌아웃 효과
                const cropWidth = plateWidth + 200; 
                const cropHeight = cropWidth; // 정사각형 비율 유지

                // 촬영할 영역의 왼쪽 상단(x, y) 좌표를 계산합니다.
                const cropX = platePos.x - (cropWidth / 2);
                
                // 접시의 y좌표에서 높이의 반을 뺍니다.
                // y축 조정폭을 기존 / 1.3 -> / 1.1로 변경하여 줌아웃 상태에서 전체를 담음
                const cropY = platePos.y - (cropHeight / 1.1); 

                // 2. 새로운 임시 캔버스를 만들어 잘라낸 이미지를 그립니다.
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = 400; // 폴라로이드 사진 영역 크기 (CSS max-width 참고)
                tempCanvas.height = 400;
                const tempCtx = tempCanvas.getContext('2d');
                
                // 원본 캔버스에서 특정 영역을 잘라서 임시 캔버스에 가득 차게 그립니다.
                tempCtx.drawImage(
                    mainCanvas,     // 원본 캔버스
                    cropX, cropY,   // 원본에서 자를 시작 위치 (x, y)
                    cropWidth, cropHeight, // 원본에서 자를 영역의 너비, 높이
                    0, 0,           // 임시 캔버스에 그릴 시작 위치 (x, y)
                    400, 400        // 임시 캔버스에 그릴 너비, 높이 (확대되어 그려짐)
                );
                
                // 임시 캔버스의 내용을 이미지 데이터(PNG)로 변환
                const imgData = tempCanvas.toDataURL("image/png");
                
                // 폴라로이드 이미지 태그에 넣기
                document.getElementById('polaroid-img').src = imgData;
                
                // 최종 점수 업데이트 및 화면 표시
                document.getElementById('final-score').innerText = `최종 점수: ${score}`;
                document.getElementById('game-over-screen').style.display = 'block';
            } catch (e) {
                console.error("스냅샷 촬영 실패:", e);
                // 실패하더라도 게임오버 화면은 띄웁니다.
                document.getElementById('final-score').innerText = `최종 점수: ${score}`;
                document.getElementById('game-over-screen').style.display = 'block';
            }
        }, 1000); 
    }

    function resetGame() {
        window.removeEventListener('mousemove', handleMouseMove);
        window.removeEventListener('mousedown', handleMouseDown);
        if (render) {
            Render.stop(render);
            render.canvas.remove();
        }
        if (runner) Runner.stop(runner);
        if (engine) {
            Composite.clear(engine.world);
            Engine.clear(engine);
        }
        init();
    }

    init();

    window.addEventListener('resize', () => {
        if(render && render.canvas) {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
        }
    });
</script>
</body>
</html>
