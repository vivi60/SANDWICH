<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>소풍</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --euphoria-green: #57825a;
            --soft-white: #fcfaf2;
            --accent-wood: #d4a373;
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: var(--euphoria-green); 
            font-family: 'Pretendard', sans-serif;
            user-select: none;
            cursor: default; 
        }
        
        #ui-container {
            position: absolute; top: 30px; width: 100%;
            text-align: center;
            pointer-events: none; z-index: 10;
            color: var(--soft-white);
        }
        #score-board { 
            font-size: 36px; font-weight: 800; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            margin-bottom: 5px;
        }
        #sub-text { font-size: 16px; opacity: 0.8; }

        #restart-top-btn {
            position: fixed; top: 20px; right: 20px; z-index: 30;
            padding: 10px 20px; font-size: 14px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white; border: 1px solid white;
            border-radius: 20px; cursor: pointer; transition: 0.3s;
            pointer-events: auto;
        }
        #restart-top-btn:hover { background-color: white; color: var(--euphoria-green); }

        #game-over-screen {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: var(--soft-white);
            padding: 60px; border-radius: 40px;
            display: none; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            z-index: 20;
            border: 5px solid var(--accent-wood);
        }
        #game-over-screen h2 { color: var(--euphoria-green); font-size: 48px; margin: 0; }
        #final-score { font-size: 26px; color: #444; margin: 25px 0; font-weight: 600; }
        
        .big-btn {
            padding: 15px 45px; font-size: 22px; cursor: pointer;
            background-color: var(--euphoria-green); color: white; 
            border: none; border-radius: 60px; 
            transition: all 0.2s;
            box-shadow: 0 5px 0 #3e5c40;
            font-weight: bold;
        }
        .big-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 0 #3e5c40; }
        .big-btn:active { transform: translateY(2px); box-shadow: none; }
    </style>
</head>
<body>

<div id="ui-container">
    <div id="score-board">SCORE: <span id="score">0</span></div>
    <div id="sub-text">재료를 쌓아 호그와트 최고의 샌드위치를 만드세요!</div>
</div>

<button id="restart-top-btn" onclick="resetGame()">다시 만들기</button>

<div id="game-over-screen">
    <h2>SANDWICH!</h2>
    <p id="final-score">최종 점수: 0</p>
    <button class="big-btn" onclick="resetGame()">다시 만들러 가기</button>
</div>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;

    let engine, render, runner;
    let score = 0;
    let isGameOver = false;
    let isCoolingDown = false; 
    
    let previewBody; 
    let currentPreviewItem; 
    const spawnY = 130; 

    const ingredientsData = [
        { name: '호밀빵', w: 150, h: 25, color: '#E8BE8D', pts: 10 },
        { name: '로스트햄', w: 130, h: 12, color: '#e5989b', pts: 5 },
        { name: '체다치즈', w: 120, h: 10, color: '#ffcc33', pts: 5 },
        { name: '싱싱한 상추', w: 160, h: 18, color: '#99d98c', pts: 15 },
        { name: '잘 익은 토마토', w: 70, h: 30, color: '#ff4d4d', pts: 20 }
    ];

    // 다음 재료를 즉시 준비하되, 쿨타임 상태를 반영함
    function prepareNextItem() {
        currentPreviewItem = ingredientsData[Math.floor(Math.random() * ingredientsData.length)];
        
        if (previewBody) {
            Composite.remove(engine.world, previewBody);
        }

        previewBody = Bodies.rectangle(
            window.innerWidth / 2, 
            spawnY, 
            currentPreviewItem.w, 
            currentPreviewItem.h, 
            { 
                isStatic: true, 
                collisionFilter: { mask: 0 }, 
                render: { 
                    fillStyle: currentPreviewItem.color, 
                    opacity: isCoolingDown ? 0.3 : 1, // 쿨타임 여부에 따라 투명도 결정
                    lineWidth: 0 
                } 
            }
        );
        
        Composite.add(engine.world, previewBody);
    }

    function handleMouseMove(e) {
        if (isGameOver || !previewBody) return;
        Body.setPosition(previewBody, { x: e.clientX, y: spawnY });
    }

    function handleMouseDown(e) {
        if (isGameOver || isCoolingDown || !currentPreviewItem) return;
        if (e.target.tagName === 'BUTTON') return;

        // 1. 현재 재료 투하
        const newIngredient = Bodies.rectangle(
            e.clientX, 
            spawnY, 
            currentPreviewItem.w, 
            currentPreviewItem.h, 
            { 
                friction: 0.8,
                restitution: 0.1,
                render: { fillStyle: currentPreviewItem.color, lineWidth: 0 } 
            }
        );
        Composite.add(engine.world, newIngredient);
        
        score += currentPreviewItem.pts;
        document.getElementById('score').innerText = score;

        // 2. 즉시 쿨타임 진입 및 다음 재료로 교체
        isCoolingDown = true;
        prepareNextItem(); // 클릭하자마자 다음 재료가 투명한 채로 등장

        // 3. 1초 뒤 쿨타임 해제 (다시 선명하게)
        setTimeout(() => {
            isCoolingDown = false;
            if (previewBody) {
                previewBody.render.opacity = 1; // 선명하게 변경
            }
        }, 1000); 
    }

    function init() {
        isGameOver = false;
        isCoolingDown = false;
        score = 0;
        document.getElementById('score').innerText = '0';
        document.getElementById('game-over-screen').style.display = 'none';

        engine = Engine.create();
        
        render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: 'transparent'
            }
        });

        const plate = Bodies.rectangle(window.innerWidth / 2, window.innerHeight - 120, 350, 30, { 
            isStatic: true, 
            label: 'plate',
            chamfer: { radius: 12 },
            render: { fillStyle: '#d4a373' } 
        });

        const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 60, window.innerWidth, 100, { 
            isStatic: true, 
            label: 'ground' 
        });

        Composite.add(engine.world, [plate, ground]);

        Render.run(render);
        runner = Runner.create();
        Runner.run(runner, engine);

        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                if (pair.bodyA.label === 'ground' || pair.bodyB.label === 'ground') {
                    gameOver();
                }
            });
        });

        prepareNextItem();
        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('mousedown', handleMouseDown);
    }

    function gameOver() {
        if (isGameOver) return;
        isGameOver = true;
        Runner.stop(runner);
        if (previewBody) Composite.remove(engine.world, previewBody);
        document.getElementById('final-score').innerText = `최종 점수: ${score}`;
        document.getElementById('game-over-screen').style.display = 'block';
    }

    function resetGame() {
        window.removeEventListener('mousemove', handleMouseMove);
        window.removeEventListener('mousedown', handleMouseDown);
        if (render) {
            Render.stop(render);
            render.canvas.remove();
        }
        if (runner) Runner.stop(runner);
        if (engine) {
            Composite.clear(engine.world);
            Engine.clear(engine);
        }
        init();
    }

    init();

    window.addEventListener('resize', () => {
        if(render && render.canvas) {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
        }
    });
</script>
</body>
</html>
